name: Test Suite

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        # Use the name field from apps/backend/package.json
        run: npm --workspace backend run test

      - name: Run web tests
        # Use the name field from apps/web/package.json
        run: npm --workspace web run test
